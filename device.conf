# GL-MT3600BE (Beryl 7) — ImmortalWrt 编译设备定义
# 所有工作流步骤引用此文件中的变量，避免硬编码
# 格式: KEY="value" (标准 shell 变量，可被 source)

DEVICE_NAME="glinet_gl-mt3600be"
DEVICE_TITLE="GL-MT3600BE (Beryl 7)"
CHIP_NAME="mt7987"
CLASH_ARCH="arm64"

# 源码仓库与分支
SOURCE_REPO="https://github.com/chasey-dev/immortalwrt-mt798x-rebase"
SOURCE_BRANCH="25.12-dev-wifi7"

# 配置文件匹配前缀 (configs/<prefix>-<variant>.config)
CONFIG_PREFIX="gl-mt3600be"

# 自托管 runner 路径 (仅在 self-hosted 模式下使用)
SELFHOSTED_WORKDIR="/data/openwrt"
SELFHOSTED_ARTIFACTS="/data/artifacts"
